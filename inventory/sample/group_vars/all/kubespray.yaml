kubelet_config_extra_args:
  # cf: https://kubernetes.io/docs/tasks/administer-cluster/cpu-management-policies
  cpuManagerPolicy: static

kube_kubeadm_controller_extra_args:
  use-service-account-credentials: true

kube_apiserver_enable_admission_plugins: [NodeRestriction]

# Enable cinder csi driver for volume provisioning
cinder_csi_enabled: true
cinder_csi_controller_replicas: 1

# Kubernetes dashboard
# RBAC required. see docs/getting-started.md for access details.
dashboard_enabled: true

## Container runtime
## docker for docker, crio for cri-o and containerd for containerd.
## Default: containerd
container_manager: containerd

## Directory where etcd data stored
etcd_data_dir: /var/lib/etcd
etcd_deployment_type: host

## It is possible to activate / deactivate selected authentication methods (oidc, static token auth)
kube_oidc_auth: true
kube_token_auth: true

## Variables for OpenID Connect Configuration https://kubernetes.io/docs/admin/authentication/
## To use OpenID you have to deploy additional an OpenID Provider (e.g Dex, Keycloak, ...)

kube_oidc_url: https://iam.{{ platform_domain_name }}/realms/{{ keycloak.realm.name }}
kube_oidc_client_id: kubectl
## Optional settings for OIDC
# kube_oidc_ca_file: "{{ kube_cert_dir }}/ca.pem"
# kube_oidc_username_claim: sub
# kube_oidc_username_prefix: 'oidc:'
kube_oidc_groups_claim: cluster-roles
kube_oidc_groups_prefix: ''

# Choose network plugin (cilium, calico, kube-ovn, weave or flannel. Use cni for generic cni plugin)
# Can also be set to 'cloud', which lets the cloud provider setup appropriate routing
kube_network_plugin: calico

# the default value of name
calico_cni_name: k8s-pod-network

# IP in IP and VXLAN is mutualy exclusive modes.
# set IP in IP encapsulation mode: "Always", "CrossSubnet", "Never"
calico_ipip_mode: 'Never'

# set VXLAN encapsulation mode: "Always", "CrossSubnet", "Never"
calico_vxlan_mode: 'Always'

# Kubernetes internal network for services, unused block of space.
kube_service_addresses: 10.233.0.0/18

# internal network. When used, it will assign IP
# addresses from this range to individual pods.
# This network must be unused in your network infrastructure!
kube_pods_subnet: 10.233.64.0/18
kube_network_node_prefix: 24

# DNS configuration.
# Kubernetes cluster name, also will be used as DNS domain
cluster_name: cluster.local
# Subdomains of DNS domain to be resolved via /etc/resolv.conf for hostnet pods
ndots: 2
# dns_timeout: 2
# dns_attempts: 2
# Custom search domains to be added in addition to the default cluster search domains
# searchdomains:
#   - svc.{{ cluster_name }}
#   - default.svc.{{ cluster_name }}
# Remove default cluster search domains (``default.svc.{{ dns_domain }}, svc.{{ dns_domain }}``).
# remove_default_searchdomains: false
# Can be coredns, coredns_dual, manual or none
dns_mode: coredns
# Set manual server if using a custom cluster DNS server
# manual_dns_server: 10.x.x.x
# Enable nodelocal dns cache
enable_nodelocaldns: true
enable_nodelocaldns_secondary: false
nodelocaldns_ip: 169.254.25.10
nodelocaldns_health_port: 9254
nodelocaldns_second_health_port: 9256
nodelocaldns_bind_metrics_host_ip: false
nodelocaldns_secondary_skew_seconds: 5

# Can be docker_dns, host_resolvconf or none
resolvconf_mode: host_resolvconf
dns_domain: "{{ cluster_name }}"

# Set Orange Flexible Engine DNS
nameservers:
  - 100.125.0.41
  - 100.126.0.41
upstream_dns_servers:
  - 100.125.0.41
  - 100.126.0.41
coredns_external_zones:
- zones:
  - prod-cloud-ocb.orange-business.com
  nameservers:
  - 100.125.0.41
  - 100.126.0.41
nodelocaldns_external_zones:
- zones:
  - prod-cloud-ocb.orange-business.com
  nameservers:
  - 100.125.0.41
  - 100.126.0.41

# audit log for kubernetes
kubernetes_audit: true
audit_log_path: /var/log/k8s_audit.log
audit_log_maxage: 30
audit_log_maxbackups: 10
audit_log_maxsize: 100

# pod security policy (RBAC must be enabled either by having 'RBAC' in authorization_modes or kubeadm enabled)
podsecuritypolicy_enabled: false

kubelet_cpu_manager_policy: static
# Reserve this space for kube resources
# Set to true to reserve resources for kube daemons
kube_reserved: true
kube_reserved_cgroups_for_service_slice: kube.slice
kube_reserved_cgroups: "/{{ kube_reserved_cgroups_for_service_slice }}"
kube_memory_reserved: 256Mi
kube_cpu_reserved: 100m
# kube_ephemeral_storage_reserved: 2Gi
# kube_pid_reserved: "1000"
# Reservation for master hosts
kube_master_memory_reserved: 512Mi
kube_master_cpu_reserved: 200m
# kube_master_ephemeral_storage_reserved: 2Gi
# kube_master_pid_reserved: "1000"

# Set to true to reserve resources for system daemons
system_reserved: true
system_reserved_cgroups_for_service_slice: system.slice
system_reserved_cgroups: "/{{ system_reserved_cgroups_for_service_slice }}"
system_memory_reserved: 512Mi
system_cpu_reserved: 500m
# system_ephemeral_storage_reserved: 2Gi
# system_pid_reserved: "1000"
# Reservation for master hosts
system_master_memory_reserved: 256Mi
system_master_cpu_reserved: 250m
# system_master_ephemeral_storage_reserved: 2Gi
# system_master_pid_reserved: "1000"

## Running on top of openstack vms with cinder enabled may lead to unschedulable pods due to NoVolumeZoneConflict restriction in kube-scheduler.
## See https://github.com/kubernetes-sigs/kubespray/issues/2141
## Set this variable to true to get rid of this issue
volume_cross_zone_attachment: false

## Automatically renew K8S control plane certificates on first Monday of each month
auto_renew_certificates: true
# First Monday of each month
# auto_renew_certificates_systemd_calendar: "Mon *-*-1,2,3,4,5,6,7 03:{{ groups['kube_control_plane'].index(inventory_hostname) }}0:00"

kubelet_rotate_server_certificates: true

kubelet_csr_approver_values:
  bypassDnsResolution: true

# Enable prometheus metrics queries
kube_proxy_metrics_bind_address: 0.0.0.0:10249