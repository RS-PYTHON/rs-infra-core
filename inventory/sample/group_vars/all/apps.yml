kibana-security:
  oidc_client_secret: "{{ lookup('password', '/dev/null length=60 chars=ascii_letters') }}"
kubectl:
  oidc_client_secret: "{{ lookup('password', '/dev/null length=60 chars=ascii_letters') }}"
linkerd:
  oidc_client_secret: "{{ lookup('password', '/dev/null length=60 chars=ascii_letters') }}"
