    enabled: "true"
    from_address: test@example.com
    from_name: Test
    host: HOST
  smtp_credentials:
    password: PASSWORD
    user: test@example.com
  serviceMonitor:
    interval: 30s
    scrapeTimeout: 10s

postgresql:
  postgres_user:
    password: "tmp_password"
  replication_password: "tmp_replication_password"
  replication_user: "tmp_replication_user"

keycloak:
  image: quay.io/keycloak/keycloak:23.0.6
  operator:
    image: quay.io/keycloak/keycloak-operator:23.0.6
  database: 
    host: postgresql-cluster-rw.database.svc.cluster.local
    name: keycloak
    username: keycloak
    password: "tmp_db_password_for_keycloak"
    secret: keycloak-database-password
  serviceMonitor:
    interval: 30s
    scrapeTimeout: 10s
  replicaCount: 1
  proxy:
    mode: passthrough
  logLevel: info
  realm:
    name: rspy

