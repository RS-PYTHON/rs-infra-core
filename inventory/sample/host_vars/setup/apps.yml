certmanager:
  clusterissuer:
    acme:
      email: user@example.com

grafana:
  # Configure here additional plugins to install in Grafana
  # The url must point to a ZIP filed, not necessarily signed
  # The name must be the plugin ID
  # Leave [] if you don't want to install any plugins
  custom_plugins: []
    # - name: ""
    #   url: ""
  smtp:
    enabled: "true"
    from_address: test@example.com
    from_name: Test
    host: HOST
  smtp_credentials:
    password: PASSWORD
    user: test@example.com
  serviceMonitor:
    interval: 30s
    scrapeTimeout: 10s
  postgresqluser:
    password: "{{ lookup('password', '/dev/null length=12 chars=ascii_letters') }}"
    username: grafanareader

postgresql:
  postgres_user:
    password: "{{ lookup('password', '/dev/null length=30 chars=ascii_letters') }}"
  replication_password: "{{ lookup('password', '/dev/null length=30 chars=ascii_letters') }}"
  replication_user: "{{ lookup('password', '/dev/null length=30 chars=ascii_letters') }}"

keycloak:
  image: quay.io/keycloak/keycloak:23.0.6
  operator:
    image: quay.io/keycloak/keycloak-operator:23.0.6
  database: 
    host: postgresql-cluster-rw.database.svc.cluster.local
    name: keycloak
    username: keycloak
    password: "{{ lookup('password', '/dev/null length=30 chars=ascii_letters') }}"
    secret: keycloak-database-password
  serviceMonitor:
    interval: 30s
    scrapeTimeout: 10s
  replicaCount: 1
  proxy:
    mode: passthrough
  logLevel: info
  realm:
    name: rspy

prefect:
  database:
    host: postgresql-cluster-rw.database.svc.cluster.local
    username: prefect
    password: "{{ lookup('password', '/dev/null length=30 chars=ascii_letters') }}"
    name: prefect
    secret: prefect-database-password

prefectworker:
  name: on-demand-k8s-pool
  number: 2

rs_server_catalog:
  database:
    host: rs-server-catalog-db-svc.database.svc.cluster.local
    name: catalog
    password: password
    username: postgres

rs_server:
  database:
    host: postgresql-cluster-rw.database.svc.cluster.local
    name: rspydemo
    password: test
    username: test
    secret: status-database-password

neuvector:
  core:
    admin:
      Fullname: "admin"
