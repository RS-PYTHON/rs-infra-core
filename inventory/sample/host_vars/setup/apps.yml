package_paths:
- apps

platform_domain_name: rspy.example.com

# TODO:
# Clean unused secrets here and in realmimport 
grafana_oidc_client_secret: "{{ lookup('password', '/dev/null length=60 chars=ascii_letters') }}"
graylog_oidc_client_secret: "{{ lookup('password', '/dev/null length=60 chars=ascii_letters') }}"
kibana_processing_oidc_client_secret: "{{ lookup('password', '/dev/null length=60 chars=ascii_letters') }}"
kibana_security_oidc_client_secret: "{{ lookup('password', '/dev/null length=60 chars=ascii_letters') }}"
kubectl_oidc_client_secret: "{{ lookup('password', '/dev/null length=60 chars=ascii_letters') }}"
linkerd_oidc_client_secret: "{{ lookup('password', '/dev/null length=60 chars=ascii_letters') }}"
prometheus_oidc_client_secret: "{{ lookup('password', '/dev/null length=60 chars=ascii_letters') }}"
thanos_oidc_client_secret: "{{ lookup('password', '/dev/null length=60 chars=ascii_letters') }}"
oauth2_proxy_oidc_client_secret: "{{ lookup('password', '/dev/null length=60 chars=ascii_letters') }}"
jupyterhub_oidc_client_secret: "{{ lookup('password', '/dev/null length=60 chars=ascii_letters') }}"
# https://oauth2-proxy.github.io/oauth2-proxy/configuration/overview/#generating-a-cookie-secret
oauth2_proxy_cookieSecret: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters') | b64encode }}"

certmanager:
  clusterissuer:
    acme:
      email: user@example.com

grafana:
  # Configure here additional plugins to install in Grafana
  # The url must point to a ZIP filed, not necessarily signed
  # The name must be the plugin ID
  # Leave [] if you don't want to install any plugins
  custom_plugins: []
    # - name: ""
    #   url: ""
  smtp:
    enabled: "true"
    from_address: test@example.com
    from_name: Test
    host: HOST
  smtp_credentials:
    password: PASSWORD
    user: test@example.com
  serviceMonitor:
    interval: 30s
    scrapeTimeout: 10s

postgresql:
  postgres_user:
    password: "{{ lookup('password', '/dev/null length=30 chars=ascii_letters') }}"
  replication_password: "{{ lookup('password', '/dev/null length=30 chars=ascii_letters') }}"
  replication_user: "{{ lookup('password', '/dev/null length=30 chars=ascii_letters') }}"

keycloak:
  image: quay.io/keycloak/keycloak:23.0.6
  operator:
    image: quay.io/keycloak/keycloak-operator:23.0.6
  database: 
    host: postgresql-cluster-rw.database.svc.cluster.local
    name: keycloak
    username: keycloak
    password: "{{ lookup('password', '/dev/null length=30 chars=ascii_letters') }}"
    secret: keycloak-database-password
  serviceMonitor:
    interval: 30s
    scrapeTimeout: 10s
  replicaCount: 1
  proxy:
    mode: passthrough
  logLevel: info
  realm:
    name: rspy

prefect:
  database:
    host: postgresql-cluster-rw.database.svc.cluster.local
    username: prefect
    password: "{{ lookup('password', '/dev/null length=30 chars=ascii_letters') }}"
    name: prefect
    secret: prefect-database-password


rs_server_catalog:
  database:
    host: rs-server-catalog-db-svc.database.svc.cluster.local
    name: catalog
    password: password
    username: postgres

rs_server:
  database:
    host: postgresql-cluster-rw.database.svc.cluster.local
    name: rspydemo
    password: test
    username: test

neuvector:
  core:
    admin:
      Fullname: "admin"
      Password: "{{ lookup('password', '/dev/null length=30 chars=ascii_letters') }}"
    exporter:
      Fullname: "exporter"
      Password: "{{ lookup('password', '/dev/null length=30 chars=ascii_letters') }}"
    secops:
      Fullname: "rspysecopsadm"
      Password: "{{ lookup('password', '/dev/null length=30 chars=ascii_letters') }}"
    secret: neuvector-init
  exporter:
    host: neuvector-svc-controller-api.svc.cluster.local
    CTRL_USERNAME: exporter
    CTRL_PASSWORD: "{{ lookup('password', '/dev/null length=30 chars=ascii_letters') }}"
    secret: exporter

wazuh:
  server:
    kibanaserver:  
      username: "kibanaserver"
      password: "{{ lookup('password', '/dev/null', length=30, chars=['ascii_letters', 'digits', '.*+?-']) }}"  
      secret: dashboard-cred
    admin: 
      username: "admin"              
      password: "{{ lookup('password', '/dev/null', length=30, chars=['ascii_letters', 'digits', '.*+?-']) }}"  
      secret: indexer-cred
    api: 
      username: "wazuh-wui"
      password: "{{ lookup('password', '/dev/null', length=30, chars=['ascii_letters', 'digits', '.*+?-']) }}" 
      secret: wazuh-api-cred
    clusterkey:
      key: "{{ lookup('password', '/dev/null', length=32, chars=['ascii_letters']) }}" 
      secret: wazuh-cluster-key
  agents:
    authd: 
      authdpass: "{{ lookup('password', '/dev/null', length=14, chars=['ascii_letters']) }}" 
      secret: wazuh-authd-pass

s3:
  endpoint: https://oss.eu-west-0.prod-cloud-ocb.orange-business.com
  region: eu-west-0

rspy:
  tmp_bucket: rs-cluster-temp
  catalog_bucket: rs-cluster-catalog

loki:
  retention: 1460h
  bucket: rs-cluster-loki

grafanatempo:
  metaMonitoring:
    serviceMonitor: 
      interval: 30s  
      scrapeTimeout: 10s
  s3:
    access_key: AK
    secret_key: SK
    bucket: rs-cluster-tempo


# You might need to create a docker registry secret
# to retrieve private container image from the
# GitHub Container Registry : ghcr.io
# Refer to the doc in /docs/how-to/GitHub Container Registry.md
github:
  registrySecret: ghcr-k8s

# To use the vault the first time you have
# to manually create an empty secret named 
# generated_inventory_vars in the vault UI
# and set the upload_existing to false and upload_backup to true
vault:
  # Download the inventory from the vault 
  download_inventory_vars: false
  # Path to the inventory in the vault ending with "/"
  path: null
  # Token to access the vault
  token: null
  # Upload newly generated inventory to the vault
  upload_backup: false
  # Upload existing inventory to the vault
  upload_existing: false
  # URL of the vault
  url: https://vault.coprs.esa-copernicus.eu