package_paths:
- apps

grafana_oidc_client_secret: "{{ lookup('password', '/dev/null length=60 chars=ascii_letters') }}"
kubectl_oidc_client_secret: "{{ lookup('password', '/dev/null length=60 chars=ascii_letters') }}"
prometheus_oidc_client_secret: "{{ lookup('password', '/dev/null length=60 chars=ascii_letters') }}"
oauth2_proxy_oidc_client_secret: "{{ lookup('password', '/dev/null length=60 chars=ascii_letters') }}"
jupyterhub_oidc_client_secret: "{{ lookup('password', '/dev/null length=60 chars=ascii_letters') }}"
apikeymanager_oidc_client_secret: "{{ lookup('password', '/dev/null length=60 chars=ascii_letters') }}"
apikeymanager_cookieSecret: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters') }}"
osam_oidc_client_secret: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters') }}"
# https://oauth2-proxy.github.io/oauth2-proxy/configuration/overview/#generating-a-cookie-secret
oauth2_proxy_cookieSecret: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters') | b64encode }}"
neuvector_oidc_client_secret: "{{ lookup('password', '/dev/null length=60 chars=ascii_letters') }}"
rsserver_cookieSecret: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters') }}"
oauth2_proxy_provider_ca_files: ""

apikeymanager:
  database:
    name: apikeymanagerdb
    host: postgresql-cluster-rw.database.svc.cluster.local
    username: apikeymanager
    password: "{{ lookup('password', '/dev/null length=30 chars=ascii_letters') }}"
    secret: apikeymanager-database-password

cinder:
  provisioner: cinder.csi.openstack.org

certmanager:
  clusterissuer:
    acme:
      email: user@example.com

grafana:
  # Configure here additional plugins to install in Grafana
  # The url must point to a ZIP filed, not necessarily signed
  # The name must be the plugin ID
  # Leave [] if you don't want to install any plugins
  custom_plugins: []
    # - name: ""
    #   url: ""
  smtp:
    enabled: "true"
    from_address: test@example.com
    from_name: Test
    host: HOST:port
  smtp_credentials:
    password: PASSWORD
    user: test@example.com
  serviceMonitor:
    interval: 30s
    scrapeTimeout: 10s

ingress:
  annotations: {}

postgresql:
  postgres_user:
    password: "{{ lookup('password', '/dev/null length=30 chars=ascii_letters') }}"
  replication_password: "{{ lookup('password', '/dev/null length=30 chars=ascii_letters') }}"
  replication_user: "{{ lookup('password', '/dev/null length=30 chars=ascii_letters') }}"
  bucket: "{{ cluster_name }}-psql"
  instances: 3

keycloak:
  database:
    host: postgresql-cluster-rw.database.svc.cluster.local
    name: keycloak
    username: keycloak
    password: "{{ lookup('password', '/dev/null length=30 chars=ascii_letters') }}"
    secret: keycloak-database-password
  replicaCount: 1
  proxy:
    mode: edge
  logLevel: info
  realm:
    name: rspy
  smtp:
    from: test@example.com
    host: HOST
    password: PASSWORD
    port: 25
    user: test@example.com
    ssl: true
    starttls: false
  adminCliRealm:
    client_id: admin-cli-realm
    secret_id: "{{ lookup('password', '/dev/null length=60 chars=ascii_letters') }}"

prefect3server:
  ops:
    # Note "-server" is automatically appended at the end of the name's value during the dpeloyment
    # so "prefect-copernicus" will be deployed as "prefect-copernicus-server"
    name: prefect-copernicus
    namespace: processing
    subDomain: processing
    allowedRoles: "role:RS-JUPYTER-USER"
    database:
      host: postgresql-cluster-rw.database.svc.cluster.local
      # Database name must be only composed of lowercase alphanumerics characters
      name: prefectcopernicus
      username: prefect
      password: "{{ lookup('password', '/dev/null length=30 chars=ascii_letters') }}"

prefect3worker:
  monitoring:
    name: monitoring-k8s-pool
    namespace: processing
    number: 2
  integrated:
    name: processing-integrated-k8s-pool
    namespace: processing
    number: 2
  sandbox:
    name: processing-sandbox-k8s-pool
    namespace: processing
    number: 2

rs_s3quotamonitoring:
  database:
    host: postgresql-cluster-rw.database.svc.cluster.local
    name: s3_quota
    password: password
    secret: s3quotamonitoring-database-password
    username: postgresuserquotamonitoring

rs_performance_indicator:
  database:
    host: postgresql-cluster-rw.database.svc.cluster.local
    name: performance
    password: test
    username: test
    secret: pi-database-password

rs_server:
  database:
    host: postgresql-cluster-rw.database.svc.cluster.local
    name: pygeoapi
    password: test
    username: test
    secret: pygeoapi-database-password
  full_domain: "{{ platform_domain_name }}"

rs_server_catalog:
  database:
    host: pgstac-cluster-rw.database.svc.cluster.local
    name: catalog
    password: password
    username: catalog
    cluster:
      instances: 3
  # -- Additionnals STAC extensions
  extensions:
    - https://stac-extensions.github.io/eo/v1.1.0/schema.json
    - https://stac-extensions.github.io/sat/v1.0.0/schema.json
    - https://stac-extensions.github.io/projection/v1.1.0/schema.json
    - https://stac-extensions.github.io/processing/v1.2.0/schema.json
    - https://stac-extensions.github.io/product/v0.1.0/schema.json
    - https://stac-extensions.github.io/sar/v1.0.0/schema.json
    - https://stac-extensions.github.io/raster/v1.1.0/schema.json
    - https://stac-extensions.github.io/authentication/v1.1.0/schema.json
    - https://stac-extensions.github.io/alternate-assets/v1.2.0/schema.json
    - https://stac-extensions.github.io/timestamps/v1.1.0/schema.json
  # -- Additionnals queryables
  queryables:
    - eo:snow_cover
    - sat:absolute_orbit
    - sat:relative_orbit
    - processing:level
    - processing:facility
    - processing:datetime
    - processing:version
    - product:type
    - product:timeliness
    - product:timeliness_category
    - sar:instrument_mode
    - published
    - expires
    - unpublished

rs_server_staging:
  # This token must be generated from https://processing.{{ platform_domain_name }}/jupyter/hub/token
  # See Prerequisite in the [Dask Gateway how-to](/docs/how-to/dask-gateway.md).
  jupyterhub_token: <REPLACE_WITH_TOKEN_GENERATED_FROM_JUPYTER>
  dask:
    # See how to calculate the following numbers
    # https://github.com/RS-PYTHON/rs-infra-core/blob/develop/docs/how-to/Dask-gateway.md#create-a-dask-cluster-for-staging-with-options-option-3
    worker_cores: 1
    worker_memory: 2.0
    worker_count: 3
    cluster_max_cores: 4 # = ( worker_count * worker_cores ) + 1
    cluster_max_workers: 4 # = worker_count + 1
    cluster_max_memory: 8589934592 # = ( worker_count + 1 ) ∗  worker_memory * 2^30

