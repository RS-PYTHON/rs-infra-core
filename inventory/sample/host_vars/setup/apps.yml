rspy:
  tmp_bucket: rs-cluster-temp
  catalog_bucket: rs-cluster-catalog

loki:
  retention: 1460h
  bucket: rs-cluster-loki

grafanatempo:
  metaMonitoring:
    serviceMonitor: 
      interval: 30s  
      scrapeTimeout: 10s
  s3:
    bucket: rs-cluster-tempo


# You might need to create a docker registry secret
# to retrieve private container image from the
# GitHub Container Registry : ghcr.io
# Refer to the doc in /docs/how-to/GitHub Container Registry.md
github:
  registrySecret: ghcr-k8s

# To use the vault the first time you have
# to manually create an empty secret named 
# generated_inventory_vars in the vault UI
# and set the upload_existing to false and upload_backup to true
vault:
  # Download the inventory from the vault 
  download_inventory_vars: false
  # Path to the inventory in the vault ending without "/"
  path: null
  # Token to access the vault
  token: null
  # Upload newly generated inventory to the vault
  upload_backup: false
  # Upload existing inventory to the vault
  upload_existing: false
  # URL of the vault
  url: https://vault.coprs.esa-copernicus.eu

velero:
  bucket: rs-cluster-velero
  bckStorageLoc:
    name: rs-cluster-velero
  volSnapLoc:
    name: aws-default