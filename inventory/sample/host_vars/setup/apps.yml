rs_server_osam:
  provider:
    secret:
      # Create a new API key or re-use the one you used to set up the ovh managed k8s
      # AK, AS and CK on https://www.ovh.com/auth/api/createToken
      # with GET, POST, PUT, DELETE on *
      ovh_endpoint: "ovh-eu"
      ovh_application_key: ""
      ovh_application_secret: ""
      ovh_consumer_key: ""
      # OVH Service (used in endpoint /cloud/project/<ovh_service>/user )
      # Aka projet id from web console https://www.ovh.com/manager/#/public-cloud/pci/projects/<project_id>/
      ovh_service: ""

rspy:
  tmp_bucket: "{{ cluster_name }}-temp"
  catalog_bucket: "{{ cluster_name }}-catalog"

loki:
  retention: 1460h
  bucket:
    chunks: "{{ cluster_name }}-loki-chunks"
    ruler: "{{ cluster_name }}-loki-ruler"

grafanatempo:
  metaMonitoring:
    serviceMonitor:
      interval: 30s
      scrapeTimeout: 10s
  s3:
    bucket: "{{ cluster_name }}-tempo"

velero:
  bucket: "{{ cluster_name }}-velero"
  bckStorageLoc:
    name: "{{ cluster_name }}-velero"
  volSnapLoc:
    name: aws-default

jupyterhub:
  ops:
    name: jupyterhub
    namespace: processing
    subDomain: processing
    allowedGroups:
      - RS-JUPYTER-USER
    adminGroups:
      - RS-ADMIN
    jupyterhub_crypt_key: "{{ lookup('password', '/dev/null', length=64, chars=['ascii_letters']) }}"
    services:
      daskgateway:
        apitoken: "{{ lookup('password', '/dev/null', length=64, chars=['ascii_letters']) }}"
        apiurl: http://hub.processing.svc.cluster.local:8081/api
      metrics:
        apitoken: "{{ lookup('password', '/dev/null', length=64, chars=['ascii_letters']) }}"
      # -- OpenTelemetry
      otel:
        # -- Trace request headers with OpenTelemetry ?
        trace_headers: false
        # -- Trace request bodies and response contents with OpenTelemetry ?
        trace_body: false

# You might need to create a docker registry secret
# to retrieve private container image from the
# GitHub Container Registry : ghcr.io
# Refer to the doc in /docs/how-to/GitHub Container Registry.md
github:
  registrySecret:
    name: ghcr-k8s
    registry: ghcr.io
    username: YOUR_GITHUB_USERNAME
    password: YOUR_GITHUB_TOKEN

# To use the vault the first time you have
# to manually create an empty secret named
# generated_inventory_vars in the vault UI
# and set the upload_existing to false and upload_backup to true
vault:
  # Download the inventory from the vault
  download_inventory_vars: false
  # Path to the inventory in the vault ending without "/"
  path: null
  # Token to access the vault
  token: null
  # Upload newly generated inventory to the vault
  upload_backup: false
  # Upload existing inventory to the vault
  upload_existing: false
  # URL of the vault
  url: https://vault.coprs.esa-copernicus.eu
