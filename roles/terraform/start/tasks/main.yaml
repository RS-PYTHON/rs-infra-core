---
- name: Start cluster
  shell: |
    set -o allexport; source {{ inventory_dir }}/.env; source {{ inventory_dir }}/openrc.sh; set +o allexport; terraform apply -auto-approve -var-file="{{ inventory_dir }}/cluster.tfvars" \
      -target=ovh_cloud_project_kube_nodepool.nodepool_infra \
      -target=ovh_cloud_project_kube_nodepool.nodepool_processing \
      -target=ovh_cloud_project_kube_nodepool.nodepool_access_csc \
      -target=ovh_cloud_project_kube_nodepool.nodepool_prefect_flow \
      -target=ovh_cloud_project_kube_nodepool.nodepool_processing_ondemand \
      -target=ovh_cloud_project_kube_nodepool.nodepool_processing_systematic
  args:
    chdir: roles/terraform/cluster/tasks/
    executable: /bin/bash
  tags: start