- name: Remove app
  block:
    - name: "{{ package_name }} - {{ app_name }} | Detect if running in GitHub Actions"
      set_fact:
        in_github_actions: "{{ lookup('env', 'GITHUB_ACTIONS') | default('false') == 'true' }}"

    - name: "{{ package_name }} - Security guard | Prevent force_delete outside GitHub Actions"
      fail:
        msg: >
          force_delete=true is only allowed in GitHub Actions (GITHUB_ACTIONS environment variable missing).
      when:
        - force_delete | default(false)
        - not in_github_actions

    - name: "{{ package_name }} - {{ app_name }} | Check whether kustomization.yaml file exists"
      stat:
        path: "{{ app_dir }}/kustomization.yaml"
      delegate_to: bastion
      register: kustomization_file

    - name: "{{ package_name }} - {{ app_name }} | Fail if no kustomization file found"
      fail:
        msg: "No kustomization.yaml file found in {{ app_dir }}. Documentation available at https://github.com/RS-PYTHON/rs-infra-core/blob/develop/docs/installation.md"
      when: not kustomization_file.stat.exists

    - name: "{{ package_name }} - {{ app_name }} | Include vars from {{ kustomization_file.stat.path }}"
      include_vars:
        file: "{{ kustomization_file.stat.path }}"
        name: kustomization
      delegate_to: bastion

    - name: "{{ package_name  }} - {{ app_name }} | Check whether .helm_repository_config.yaml exists"
      stat:
        path: "{{ app_dir }}/.helm_repository_config.yaml"
      register: repository_config
      delegate_to: bastion

    - name: "{{ package_name  }} - {{ app_name }} | Include vars from .helm_repository_config.yaml"
      include_vars:
        file: "{{ app_dir }}/.helm_repository_config.yaml"
      when: repository_config.stat.exists
      delegate_to: bastion

    - name: "{{ package_name }} - {{ app_name }} | Create tmp directory for k8s resources"
      tempfile:
        state: directory
        suffix: "k8s_resources_{{ app_name }}"
      register: resources_dir
      delegate_to: bastion
      check_mode: false

    - name: "{{ package_name }} - {{ app_name }} | Template and send resources to remote"
      template:
        src: "{{ item }}"
        dest: "{{ resources_dir.path }}/{{ item | basename }}"
      with_fileglob: "{{ app_dir }}/*"
      when:
        - item not in ['.helm_repository_config.yaml', 'resources.txt']
      delegate_to: bastion
      check_mode: false

    - name: "{{ package_name }} - {{ app_name }} | Copy subdirectories to remote"
      copy:
        src: "{{ app_dir }}/{{ item.path }}"
        dest: "{{ resources_dir.path }}"
      with_community.general.filetree: "{{ app_dir }}/"
      when:
        - item.state == 'directory'
      delegate_to: bastion
      check_mode: false

    - name: "{{ package_name }} - {{ app_name }} | Pull charts from private repositories"
      shell: |
        helm pull \
        --untar --untardir {{ resources_dir.path }}/charts \
        --repo {{ item.0.repo }} {{ item.0.name }} \
        {{ "--version " + item.0.version if item.0.version is defined else omit }} \
        {{ "--username " + item.1.username if item.1.username is defined else omit }} \
        {{ "--password " + item.1.password if item.1.password is defined else omit }}
      loop: "{{ kustomization.helmCharts | product(helm_repositories) }}"
      when:
        - repository_config.stat.exists
        - helm_repositories is defined
        - kustomization.helmCharts is defined
        - item.0.repo == item.1.name
      delegate_to: bastion
      check_mode: false

    - name: "{{ package_name }} - {{ app_name }} | Create temporary manifest file"
      tempfile:
        state: file
        suffix: ".yaml"
      register: tmp_manifest
      delegate_to: bastion

    - name: "{{ package_name }} - {{ app_name }} | Render manifests once"
      shell: |
        kustomize build --enable-helm {{ resources_dir.path }} > {{ tmp_manifest.path }}
      delegate_to: bastion

    - name: "{{ package_name }} - {{ app_name }} | Preview resources to be deleted"
      shell: |
        echo -e "\033[1;31m============================================================\033[0m"
        echo -e "\033[1;31m   WARNING: You are about to delete Kubernetes resources:\033[0m"
        echo -e "\033[1;31m   app.kubernetes.io/instance={{ app_name }}\033[0m"
        echo -e "\033[1;31m============================================================\033[0m"
        kubectl get -f {{ tmp_manifest.path }} -l app.kubernetes.io/instance={{ app_name }}
      register: preview
      delegate_to: bastion

    - debug:
        msg: "{{ preview.stdout_lines }}"

    - name: "{{ package_name }} - {{ app_name }} | Ask for confirmation"
      pause:
        prompt: "⚠️ To CONFIRM deletion, type EXACTLY 'YES': "
      register: confirmation
      when: not force_delete | default(false)

    - name: "{{ package_name }} - {{ app_name }} | Abort if not confirmed"
      fail:
        msg: "Operation cancelled by user."
      when:
        - not force_delete | default(false)
        - confirmation.user_input != "YES"

    - name: "{{ package_name }} - {{ app_name }} | Remove resources"
      shell: |
        kubectl delete -f {{ tmp_manifest.path }} -l app.kubernetes.io/instance={{ app_name }}
      register: result
      delegate_to: bastion
      when: force_delete | default(false) or confirmation.user_input == "YES"

    - name: "{{ package_name }} - {{ app_name }} | reset facts"
      set_fact:
        resources: []
        jobs:
          resources: []
        pods:
          resources: []
        deployments:
          resources: []
      delegate_to: bastion

    - name: "{{ package_name }} - {{ app_name }} | Delete resources.txt"
      file:
        path: "{{ app_dir }}/resources.txt"
        state: absent
      delegate_to: bastion

  always:
    - name: "{{ package_name }} - {{ app_name }} | Remove temporary manifest file"
      file:
        path: "{{ tmp_manifest.path }}"
        state: absent
      delegate_to: bastion

    - name: "{{ package_name }} - {{ app_name }} | Remove resources tmp dir"
      file:
        path: "{{ resources_dir.path }}"
        state: absent
      when:
        - resources_dir.path is defined
        - not debug
      delegate_to: bastion

    - name: "{{ package_name }} - {{ app_name }} | Warn about not deleted tmp folder"
      debug:
        msg:
          - "DEBUG: the temporary folder containing the k8s resources has been kept for debugging purpose"
          - "{{ resources_dir.path }}"
          - "DO NOT FORGET TO DELETE IT WHEN YOU ARE DONE"
      when:
        - debug
      delegate_to: bastion
