name: Test Ansible playbook deployment

# Run workflow only for ...
on:
  pull_request: # pull requests
    types: [opened, synchronize, reopened]
  push:
    branches:
      - develop # pushes on the 'develop' branch
    tags:
      - '**' # new git tags (including hierarchical tags like v1.0/beta)
  workflow_dispatch: # manual trigger

jobs:
  test-deploy:
    if: github.actor != 'dependabot[bot]' # ignore pull requests by github bot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install requirements
        run: |
          # Install miniforge
          mkdir -p ~/miniforge3
          wget -q "https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-$(uname)-$(uname -m).sh" -O ~/miniforge3/miniforge.sh
          bash ~/miniforge3/miniforge.sh -b -u -p ~/miniforge3
          rm -f ~/miniforge3/miniforge.sh

          # Init conda
          ~/miniforge3/bin/conda init bash
          conda update -n base -c defaults conda

          # Create conda env with python
          # conda update -n base -c defaults conda
          conda create -y -n rspy python=3.11

          # Install Ansible, Terraform, Openstackclient
          conda run -n rspy conda install -y -c conda-forge ansible terraform python-openstackclient passlib boto3 kubernetes-helm kubernetes-client python-kubernetes

          conda run -n rspy ansible-galaxy collection install openstack.cloud amazon.aws kubernetes.core community.general

          ln -s /usr/share/miniconda/envs/rspy/bin/kubectl /usr/local/bin/kubectl
        shell: bash
      - name: Start minikube
        uses: medyagh/setup-minikube@latest
        with:
          addons: 'metallb'
          cpus: 4
          memory: 8000m
      - name: "Configure cluster labels, IP and DNS (host + CoreDNS)"
        run: |
          .github/common/resources/configure-cluster.sh "node-role.kubernetes.io/infra=" "iam kube oauth2-proxy"
        shell: bash
      - name: Deploy minio
        run: |
          # Minio for cloudnative pg - https://github.com/minio/minio/tree/master/helm/minio#installing-the-chart-toy-setup
          helm repo add minio https://charts.min.io/
          helm repo update minio
          helm install minio minio/minio --namespace minio --set mode=standalone --set replicas=1 --set persistence.enabled=false --set resources.requests.memory=512Mi --set rootUser=s3_access_key,rootPassword=s3_secret_key --set buckets[0].name=rs-cluster-psql,buckets[1].name=rs-cluster-velero --create-namespace --wait
        shell: bash
      - name: Generate inventory
        run: |
          cp -rfp inventory/sample inventory/mycluster
          mv inventory/mycluster/.env.template inventory/mycluster/.env
          mv inventory/mycluster/openrc.sh.template inventory/mycluster/openrc.sh
          sed -i 's!<changeme_with_full_path>/miniforge3/envs/rspy!/usr/share/miniconda/envs/rspy!g' inventory/mycluster/hosts.yaml
          # --- Use minio as S3 provider and local CA issuer instead of Let's Encrypt
          sed -i\
              -e 's!https://s3.gra.io.cloud.ovh.net!http://minio.minio.svc.cluster.local:9000!'\
              -e 's!letsencrypt-prod!local-ca-issuer!g'\
              inventory/mycluster/host_vars/setup/main.yaml
          # --- Configure minikube storage class provisioner, ingress-nginx LoadBalancer to retrieve fixed IP address from metalLB, oauth2-proxy to trust local-ca
          sed -i \
              -e 's!cinder.csi.openstack.org!k8s.io/minikube-hostpath!g'\
              -e 's!instances: 3!instances: 1!g'\
              -e 's!annotations: {}!annotations:\n    metallb.universe.tf/address-pool: default!g'\
              -e 's!provider_ca_files: ""!provider_ca_files: "/etc/ssl/certs/local-ca/tls.crt"!g'\
              inventory/mycluster/host_vars/setup/apps.yml
          # --- Generate inventory
          conda run -n rspy --no-capture-output env PYTHONUNBUFFERED=1 ANSIBLE_FORCE_COLOR=1 ansible-playbook registry.yaml -i inventory/mycluster/hosts.yaml -e ci_mode=true
          conda run -n rspy --no-capture-output env PYTHONUNBUFFERED=1 ANSIBLE_FORCE_COLOR=1 ansible-playbook generate_inventory.yaml -i inventory/mycluster/hosts.yaml
        shell: bash
      - name: Deploy the apps (check)
        run: |
          conda run -n rspy --no-capture-output env PYTHONUNBUFFERED=1 ANSIBLE_FORCE_COLOR=1 ansible-playbook --check apps.yaml -i inventory/mycluster/hosts.yaml -e private_registry=true
        shell: bash
      - name: Deploy the apps (for real)
        run: |
          sed -i 's!debug: false!debug: true!g' roles/app-installer/defaults/main.yaml

          # --- Use local cluster issuer instead of Let's Encrypt
          .github/common/resources/configure-local-ca.sh iam:iam kube:default oauth2-proxy:iam

          # --- Install applications and wait for their successful deployment
          conda run -n rspy --no-capture-output env PYTHONUNBUFFERED=1 ANSIBLE_FORCE_COLOR=1 ansible-playbook apps.yaml -i inventory/mycluster/hosts.yaml
        shell: bash
      - name: Export Keycloak realm
        if: always()
        run: |
          set -euo pipefail

          # --- Extract configuration values ---
          DOMAIN=$(yq e '.platform_domain_name' inventory/mycluster/host_vars/setup/main.yaml)
          REALM_NAME=$(yq e '.keycloak.realm.name' inventory/mycluster/group_vars/all/generated_inventory_vars.yaml)

          # Construct the external Keycloak URL
          KEYCLOAK_URL="https://iam.$DOMAIN"

          echo "🌐 Using Keycloak URL: $KEYCLOAK_URL"
          echo "🧩 Realm name: $REALM_NAME"

          # --- Get admin credentials from Kubernetes secret ---
          ADMIN_USER=$(kubectl -n iam get secret keycloak-initial-admin -o jsonpath='{.data.username}' | base64 --decode)
          ADMIN_PASSWORD=$(kubectl -n iam get secret keycloak-initial-admin -o jsonpath='{.data.password}' | base64 --decode)

          # --- Obtain admin access token ---
          echo "🔑 Getting admin token..."
          TOKEN=$(wget -qO- --post-data "username=$ADMIN_USER&password=$ADMIN_PASSWORD&grant_type=password&client_id=admin-cli" \
            --header="Content-Type: application/x-www-form-urlencoded" \
            --no-check-certificate \
            "$KEYCLOAK_URL/realms/master/protocol/openid-connect/token" | jq -r .access_token)

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "❌ Failed to obtain Keycloak token"
            exit 1
          fi

          # --- Perform partial realm export ---
          echo "📦 Exporting realm '$REALM_NAME'..."
          wget -q -O realm-export.json \
            --header="Authorization: Bearer $TOKEN" \
            --header="Content-Type: application/json" \
            --no-check-certificate \
            --post-data "" \
            "$KEYCLOAK_URL/admin/realms/$REALM_NAME/partial-export?exportClients=true&exportGroupsAndRoles=true"

          echo "✅ Realm export completed:"
          ls -lh realm-export.json

          # --- Convert the JSON export to YAML ---
          echo "🔄 Converting JSON export to YAML..."
          pip install ruamel.yaml
          ./.github/common/resources/convert-export-realm.py realm-export.json realm-export.yaml

          echo "✅ Conversion completed:"
          ls -lh realm-export.yaml
        shell: bash
      - name: Upload Keycloak realm export artifacts
        uses: actions/upload-artifact@v4
        with:
          name: keycloak-realm-export
          path: |
            realm-export.json
            realm-export.yaml
