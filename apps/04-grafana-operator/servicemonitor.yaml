---
apiVersion: v1
kind: Service
metadata:
  name: grafana-operator
  namespace: "monitoring"
  labels:
    app.kubernetes.io/instance: grafana-operator
spec:
  clusterIP: None
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/instance: grafana-operator
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: grafana-operator
  namespace: monitoring
  labels:
    app.kubernetes.io/instance: grafana-operator
spec:
  jobLabel: "app.kubernetes.io/name"
  selector:
    matchLabels:
      app.kubernetes.io/instance: grafana-operator
  namespaceSelector:
    matchNames:
      - "monitoring"
  endpoints:
    - port: metrics
      interval: 2m