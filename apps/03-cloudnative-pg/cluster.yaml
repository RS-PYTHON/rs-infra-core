apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgresql-cluster
spec:
  instances: 3
  
  enableSuperuserAccess: true

  backup:
    barmanObjectStore:
      destinationPath: s3://{{ postgresql.bucket }}/postgresql-cluster/
      endpointURL: {{ s3.endpoint }}
      s3Credentials:
        accessKeyId:
          key: AK
          name: psql-backup-obs
        secretAccessKey:
          key: SK
          name: psql-backup-obs
    retentionPolicy: "10d"

  postgresql:
    parameters:
      shared_buffers: "256MB"

  resources:
    requests:
      memory: "256Mi"
      cpu: 0.1
    limits:
      memory: "1024Mi"
      cpu: 0.3

  storage:
    storageClass: csi-cinder-sc-retain
    size: 30Gi

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: "node-role.kubernetes.io/infra"
              operator: Exists
  monitoring:
    enablePodMonitor: true