commonLabels:
  app.kubernetes.io/instance: "{{ app_name }}"
  
namespace: security

configMapGenerator:
  - name: wa-script-configmap
    files:
      - wazuh-agent_install.sh

  - name: wa-alpine-configmap
    files: 
      - wazuh-alpine-apk.sh


secretGenerator:
- name: "{{ wazuh.agents.key2.secret }}"
  literals:
  - authd.pass="{{ wazuh.agents.key2.authdpass }}"
  options:
    disableNameSuffixHash: true
- name: "{{ wazuh.server.user3.secret }}"
  literals:
  - username="{{ wazuh.server.user3.username }}"
  - password="{{ wazuh.server.user3.password }}"
  options:
    disableNameSuffixHash: true

resources:
  - wa-install-ds.yaml