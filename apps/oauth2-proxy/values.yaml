# Oauth client configuration specifics
config:
  annotations: {}
  clientID: "oauth2-proxy"
  clientSecret: "{{ oauth2_proxy_oidc_client_secret }}"
  cookieSecret: "{{ oauth2_proxy_cookieSecret }}"
  configFile: |-
    provider="keycloak-oidc"
    provider_display_name="Keycloak"
    redirect_url="https://oauth2-proxy.{{ platform_domain_name }}/oauth2/callback"
    oidc_issuer_url="https://iam.{{ platform_domain_name }}/realms/rspy"
    code_challenge_method="S256"
    scope="openid"
    whitelist_domains=".{{ platform_domain_name }}"
    email_domains=[ "*" ]
    cookie_domains=".{{ platform_domain_name }}"
    insecure_oidc_skip_issuer_verification="false"
    insecure_oidc_allow_unverified_email="true"
    provider_ca_files="{{ oauth2_proxy_provider_ca_files }}"
    reverse_proxy="true"
    skip_jwt_bearer_tokens="true"

ingress:
  enabled: true
  className: nginx
  path: /
  pathType: Prefix
  hosts:
    - oauth2-proxy.{{ platform_domain_name }}
  labels: {}
  tls:
    - secretName: oauth2-proxy-{{ platform_domain_name | replace(".", "-") }}
      hosts:
        - oauth2-proxy.{{ platform_domain_name }}
  annotations:
    cert-manager.io/cluster-issuer: "{{ cluster_issuer }}"
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/proxy-buffer-size: "32k"

resources:
  limits:
    memory: 24Mi
  requests:
    memory: 6Mi

sessionStorage:
  type: redis
  redis:
    clientType: "standalone"
redis-ha:
  enabled: true
  replicas: 1
  redis:
    config:
      min-replicas-to-write: 0
  persistentVolume:
    enabled: false
  additionalAffinities:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: "node-role.kubernetes.io/infra"
              operator: Exists

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
          - key: "node-role.kubernetes.io/infra"
            operator: Exists
