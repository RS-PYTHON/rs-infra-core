## Deployment Configuration
server:
  image:
    repository: prefecthq/prefect
    prefectTag: 2-latest
    pullPolicy: IfNotPresent

  prefectApiUrl: http://localhost:4200/api

  prefectApiHost: 0.0.0.0

  uiConfig:
    enabled: true
    prefectUiUrl: ""
    prefectUiStaticDirectory: "/ui_build"

  env: []

  # -- affinity for server pods assignment
  affinity:         
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: "node-role.kubernetes.io/infra"
              operator: Exists

## Service configuration
service:
  type: ClusterIP
  port: 4200
  targetPort: 4200
  clusterIP: ""
  nodePort: ""
  externalTrafficPolicy: Cluster

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  #path must be /
  host:
    hostname: processing.{{ platform_domain_name }}
    path: /
    pathType: Prefix

  annotations: 
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/proxy-buffer-size: 32k
    nginx.ingress.kubernetes.io/auth-signin: https://staging1.{{ platform_domain_name }}/oauth2/start?rd=https://$host
    nginx.ingress.kubernetes.io/auth-url: https://staging1.{{ platform_domain_name }}/oauth2/auth
    nginx.ingress.kubernetes.io/auth-response-headers: Authorization

  tls: true
  # -- create a TLS secret for this ingress record using self-signed certificates generated by Helm
  selfSigned: false

  extraTls:
    - hosts:
        - processing.{{ platform_domain_name }}
      secretName: processing-{{ platform_domain_name | replace(".", "-") }}

# Postgresql configuration
postgresql:
  enabled: true
  auth:
    enablePostgresUser: false
    database: prefect
    username: {{ prefect.database.username }}
    password: {{ prefect.database.password }}
  containerPorts:
    postgresql: 5432
  externalHostname: {{ prefect.database.host }}
  useSubChart: false
  