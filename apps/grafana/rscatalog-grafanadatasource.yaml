apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: rscatalog
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  allowCrossNamespaceImport: true
  datasource:
    name: Postgres-RScatalog
    type: postgres
    access: proxy
    url: rs-server-catalog-db-svc.database.svc.cluster.local
    user: {{ grafana.postgresqluser.username }}
    secureJsonData:
      password: '{{ grafana.postgresqluser.password }}'
    isDefault: false
    jsonData:
      database: catalog
      sslmode: disable
      "tlsSkipVerify": true
      "timeInterval": "5s"