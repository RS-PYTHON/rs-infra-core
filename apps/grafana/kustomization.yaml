namespace: monitoring

commonLabels:
  app.kubernetes.io/instance: "{{ app_name }}"

resources:
  - grafana.yaml
  - podmonitor.yaml
  - image-renderer.yaml

secretGenerator:
- name: grafana-credentials
  literals:
  - smtp_user="{{ grafana.smtp_credentials.user }}"
  - smtp_password="{{ grafana.smtp_credentials.password }}"
  - GRAFANA_CLIENT_SECRET="{{ grafana_oidc_client_secret }}"
  options:
    disableNameSuffixHash: true