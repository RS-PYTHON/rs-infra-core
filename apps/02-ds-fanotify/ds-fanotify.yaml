apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: "{{ app_name }}"
spec:
  selector:
    matchLabels:
      app: "{{ app_name }}"
  template:
    metadata:
      labels:
        app: "{{ app_name }}"
    spec:
      #restartPolicy: Always
      hostPID: true
      hostNetwork: true
      #hostIPC: true
      containers:
      - name: pause
        image: gcr.io/google-containers/pause:latest
      initContainers:
      - name: sysctl-init
        image: busybox:latest
        command:
        - /bin/sh
        - -c
        - |
          sysctl -w fs.fanotify.max_user_groups=256  # Set the maximum number of opened file
        securityContext:
          privileged: true
          #runAsUser: 0
      tolerations:
  tolerations:
    - key: role
      operator: Equal
      value: infra
      effect: NoSchedule
    - key: role
      operator: Equal
      value: processing
      effect: NoSchedule
    - key: role
      operator: Equal
      value: access_csc
      effect: NoSchedule
    - key: role
      operator: Equal
      value: prefect_flow
      effect: NoSchedule
    - key: role
      operator: Equal
      value: ondemand_dpr
      effect: NoSchedule
    - key: role
      operator: Equal
      value: systematic_dpr
      effect: NoSchedule
