apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: loki
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  datasource:
    name: Loki
    type: loki
    access: proxy
    url: http://loki-query-frontend.logging.svc.cluster.local:3100
    isDefault: false
    jsonData:
      "tlsSkipVerify": true
      "timeInterval": "5s"