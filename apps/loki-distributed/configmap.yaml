---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-distributed
  namespace: logging
  labels:
    helm.sh/chart: loki-distributed-0.78.5
    app.kubernetes.io/name: loki-distributed
    app.kubernetes.io/instance: loki-distributed
    app.kubernetes.io/version: "2.9.6"
    app.kubernetes.io/managed-by: Helm
data:
  config.yaml: |
    auth_enabled: false
    common:
      compactor_address: http://loki-distributed-compactor:3100
    compactor:
      compaction_interval: 10m
      retention_delete_delay: 2h
      retention_delete_worker_count: 150
      retention_enabled: true
      shared_store: aws
      working_directory: /var/loki/retention
    distributor:
      ring:
        kvstore:
          store: memberlist
    frontend:
      compress_responses: true
      log_queries_longer_than: 5s
      tail_proxy_url: http://loki-distributed-querier:3100
    frontend_worker:
      frontend_address: loki-distributed-query-frontend-headless:9095
    ingester:
      chunk_block_size: 262144
      chunk_encoding: snappy
      chunk_idle_period: 30m
      chunk_retain_period: 1m
      lifecycler:
        ring:
          kvstore:
            store: memberlist
          replication_factor: 1
      max_transfer_retries: 0
      wal:
        dir: /var/loki/wal
    ingester_client:
      grpc_client_config:
        grpc_compression: gzip
    limits_config:
      enforce_metric_name: false
      max_cache_freshness_per_query: 10m
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      split_queries_by_interval: 15m
      retention_period: {{ loki.retention }}
    memberlist:
      join_members:
      - loki-distributed-memberlist
    query_range:
      align_queries_with_step: true
      cache_results: true
      max_retries: 5
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            ttl: 24h
    runtime_config:
      file: /var/loki-distributed-runtime/runtime.yaml
    schema_config:
      configs:
      - from: "2020-09-01"
        index:
          period: 24h
          prefix: loki_index_
        object_store: aws
        schema: v12
        store: boltdb-shipper
    storage_config:
      aws:
        access_key_id: {{ loki.s3.access_key }}
        bucketnames: {{ loki.s3.bucket }}
        endpoint: {{ loki.s3.endpoint }}
        http_config:
          idle_conn_timeout: 90s
          insecure_skip_verify: false
          response_header_timeout: 0s
        insecure: false
        region: {{ loki.s3.region }}
        s3forcepathstyle: true
        secret_access_key: {{ loki.s3.secret_key }}
        sse_encryption: false
      boltdb_shipper:
        active_index_directory: /var/loki/index
        cache_location: /var/loki/cache
        cache_ttl: 168h
        shared_store: aws
    table_manager:
      retention_deletes_enabled: false
      retention_period: 0s
