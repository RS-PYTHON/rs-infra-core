csimanila:
  runtimeConfig:
    enabled: false
    jsonData: |-
      {
        "nfs": {
          "matchExportLocationAddress": "192.168.1.0/24"
        }
      }

controllerplugin:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: node-role.kubernetes.io/infra
            operator: Exists

nodeplugin:
  tolerations:
    - effect: NoSchedule
      key: node-role.kubernetes.io/master
    - effect: NoSchedule
      key: node-role.kubernetes.io/control-plane
    - key: role
      value: infra
      effect: NoSchedule
    - key: role
      value: rs_server
      effect: NoSchedule
    - key: role
      value: rs_env
      effect: NoSchedule
    - key: role
      value: access_csc
      effect: NoSchedule
    - key: role
      value: prefect_flow
      effect: NoSchedule
    - key: role
      value: dask_scheduler
      effect: NoSchedule
    - key: role
      value: dask_worker_on_demand
      effect: NoSchedule
