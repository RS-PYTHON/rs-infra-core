apiVersion: velero.io/v1
kind: Backup
metadata:
  name: backup-pvc-grafana
  namespace: infra
spec:
  includedNamespaces:
    - monitoring
  includedResources:
    - persistentvolumeclaims
    - persistentvolumes
  labelSelector:
    matchLabels:
      app: grafana
  storageLocation: {{ velero.bckStorageLoc.name }}
  ttl: 72h