apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: schedule-backup-grafana
  namespace: infra
spec:  
  schedule: "0 12 * * *"
  template:
    ttl: 240h
    includedNamespaces:
      - monitoring
    labelSelector:
      matchLabels:
        app: grafana
        backup: opt-in
    snapshotVolumes: true
    storageLocation: {{ velero.bckStorageLoc.name }}
    volumeSnapshotLocations:
      - aws-default