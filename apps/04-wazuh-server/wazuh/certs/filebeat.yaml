---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: filebeat
  namespace: security
spec:
  issuerRef:
    group: cert-manager.io
    kind: Issuer
    name: wazuh-issuer
  secretName: filebeat-tls
  commonName: filebeat
  dnsNames:
    - "filebeat"
  usages:
    - "signing"
    - "key encipherment"
    - "server auth"
    - "client auth"
    - digital signature
  duration: 2160h
  renewBefore: 360h
  isCA: false
  privateKey:
    algorithm: RSA
    encoding: PKCS8
    size: 2048
    rotationPolicy: Always 

