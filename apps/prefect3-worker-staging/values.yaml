## Common parameters
# -- fully override common.names.fullname
fullnameOverride: "prefect3-worker"

worker:
  clusterUid: "rspy"
  image:
    repository: prefecthq/prefect
    prefectTag: 3.1.4-python3.11-kubernetes
    pullPolicy: IfNotPresent
  apiConfig: server
  config:
    workPool:  {{ prefect3worker.staging.name }}
    limit: 10
    baseJobTemplate:
      configuration: |
        {
          "variables": {
            "type": "object",
            "properties": {
              "env": {
                "type": "object",
                "title": "Environment Variables",
                "description": "Environment variables to set when starting a flow run.",
                "additionalProperties": {
                  "type": "string"
                }
              },
              "name": {
                "type": "string",
                "title": "Name",
                "default": "staging-pool",
                "description": "Name given to infrastructure created by a worker."
              },
              "image": {
                "type": "string",
                "title": "Image",
                "default": "docker.io/prefecthq/prefect:3.1.4-python3.11-kubernetes",
                "example": "docker.io/prefecthq/prefect:3.1.4-python3.11-kubernetes",
                "description": "The image reference of a container image to use for created jobs. If not set, the latest Prefect image will be used."
              },
              "labels": {
                "type": "object",
                "title": "Labels",
                "description": "Labels applied to infrastructure created by a worker.",
                "additionalProperties": {
                  "type": "string"
                }
              },
              "command": {
                "type": "string",
                "title": "Command",
                "description": "The command to use when starting a flow run. In most cases, this should be left blank and the command will be automatically generated by the worker."
              },
              "namespace": {
                "type": "string",
                "title": "Namespace",
                "default": "processing",
                "description": "The Kubernetes namespace to create jobs within."
              },
              "stream_output": {
                "type": "boolean",
                "title": "Stream Output",
                "default": true,
                "description": "If set, output will be streamed from the job to local standard output."
              },
              "cluster_config": {
                "allOf": [
                  {
                    "$ref": "#/definitions/KubernetesClusterConfig"
                  }
                ],
                "title": "Cluster Config",
                "description": "The Kubernetes cluster config to use for job creation."
              },
              "finished_job_ttl": {
                "type": "integer",
                "title": "Finished Job TTL",
                "description": "The number of seconds to retain jobs after completion. If set, finished jobs will be cleaned up by Kubernetes after the given delay. If not set, jobs will be retained indefinitely."
              },
              "image_pull_policy": {
                "enum": [
                  "IfNotPresent",
                  "Always",
                  "Never"
                ],
                "type": "string",
                "title": "Image Pull Policy",
                "default": "IfNotPresent",
                "description": "The Kubernetes image pull policy to use for job containers."
              },
              "service_account_name": {
                "type": "string",
                "title": "Service Account Name",
                "description": "The Kubernetes service account to use for job creation."
              },
              "job_watch_timeout_seconds": {
                "type": "integer",
                "title": "Job Watch Timeout Seconds",
                "description": "Number of seconds to wait for each event emitted by a job before timing out. If not set, the worker will wait for each event indefinitely."
              },
              "pod_watch_timeout_seconds": {
                "type": "integer",
                "title": "Pod Watch Timeout Seconds",
                "default": 60,
                "description": "Number of seconds to watch for pod creation before timing out."
              }
            },
            "definitions": {
              "KubernetesClusterConfig": {
                "type": "object",
                "title": "KubernetesClusterConfig",
                "required": [
                  "config",
                  "context_name"
                ],
                "properties": {
                  "config": {
                    "type": "object",
                    "title": "Config",
                    "description": "The entire contents of a kubectl config file."
                  },
                  "context_name": {
                    "type": "string",
                    "title": "Context Name",
                    "description": "The name of the kubectl context to use."
                  }
                },
                "description": "Stores configuration for interaction with Kubernetes clusters.\n\nSee `from_file` for creation.",
                "secret_fields": [],
                "block_type_slug": "kubernetes-cluster-config",
                "block_schema_references": {}
              }
            },
            "description": "Default variables for the Kubernetes worker.\n\nThe schema for this class is used to populate the `variables` section of the default\nbase job template."
          },
          "job_configuration": {
            "env": "",
            "name": "{{ prefect3worker.staging.name }}",
            "labels": "",
            "command": null,
            "namespace": "processing",
            "job_manifest": {
              "kind": "Job",
              "spec": {
                "affinity": {
                  "nodeAffinity": {
                    "requiredDuringSchedulingIgnoredDuringExecution": {
                      "nodeSelectorTerms": [
                        {
                          "matchExpressions": [
                            {
                              "key": "node-role.kubernetes.io/staging",
                              "operator": "Exists"
                            }
                          ]
                        }
                      ]
                    }
                  }
                },
                "template": {
                  "spec": {
                    "containers": [
                      {
                        "env": null,
                        "args": null,
                        "name": "prefect-job",
                        "image": "docker.io/prefecthq/prefect:3.1.4-python3.11-kubernetes",
                        "imagePullPolicy": "IfNotPresent"
                      }
                    ],
                    "completions": 1,
                    "parallelism": 1,
                    "restartPolicy": "Never",
                    "serviceAccountName": "prefect3-worker"
                  }
                },
                "backoffLimit": 0,
                "ttlSecondsAfterFinished": null
              },
              "metadata": {
                "labels": {},
                "namespace": "processing",
                "generateName": "{{ prefect3worker.staging.name }}-"
              },
              "apiVersion": "batch/v1"
            },
            "stream_output": true,
            "cluster_config": null,
            "job_watch_timeout_seconds": null,
            "pod_watch_timeout_seconds": "60"
          }
        }

  affinity:         
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: "node-role.kubernetes.io/staging"
              operator: Exists

  serverApiConfig:
    apiUrl: http://prefect3-server.processing.svc.cluster.local:4200/api

  # ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
  livenessProbe:
    enabled: true

  replicaCount: {{ prefect3worker.staging.number | default(2) }}
