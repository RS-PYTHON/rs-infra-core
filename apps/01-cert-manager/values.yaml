installCRDs: false

config:
  featureGates:
    # Disable the use of Exact PathType in Ingress resources, to work around a bug in ingress-nginx
    # https://github.com/kubernetes/ingress-nginx/issues/11176
    ACMEHTTP01IngressPathTypeExact: false

prometheus:
  enabled: true
  servicemonitor:
    # Create a ServiceMonitor to add cert-manager to Prometheus.
    enabled: true

resources:
  limits:
    memory: 48Mi
    limits:
     memory: 24Mi

startupapicheck:
  enabled: false

webhook:
  livenessProbe:
    initialDelaySeconds: 10
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: "node-role.kubernetes.io/infra"
              operator: Exists
  resources:
    limits:
     memory: 24Mi
    requests:
     memory: 10Mi

cainjector:
  enabled: true
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: "node-role.kubernetes.io/infra"
              operator: Exists
  resources:
    limits:
     memory: 84Mi
    requests:
     memory: 40Mi

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
          - key: "node-role.kubernetes.io/infra"
            operator: Exists
