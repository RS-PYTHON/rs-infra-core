nameOverride: ""

fullnameOverride: ""

gateway:
  replicas: 1

  annotations: {}

  resources: {}

  prefix: /

  loglevel: INFO

  image:
    name: ghcr.io/dask/dask-gateway-server
    tag: "2024.1.0"
    pullPolicy:

  env: []

  imagePullSecrets: []

  service:
    annotations: {}

  auth:
    type: jupyterhub

    simple:
      password:

    kerberos:
      keytab:

    jupyterhub:
      apiToken:

      apiTokenFromSecretName: hub
      apiTokenFromSecretKey: hub.services.dask-gateway.apiToken

      apiUrl:

    custom:
      class:

      config: {}

  livenessProbe:
    enabled: true
    initialDelaySeconds: 5
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 6
  readinessProbe:
    enabled: true
    initialDelaySeconds: 5
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3

  nodeSelector: {}

  # affinity:
  #   nodeAffinity:
  #     requiredDuringSchedulingIgnoredDuringExecution:
  #       nodeSelectorTerms:
  #         - matchExpressions:
  #           - key: "node-role.kubernetes.io/infra"
  #             operator: Exists

  tolerations: []

  extraConfig: {}

  backend:
    image:
      name: ghcr.io/dask/dask-gateway
      tag: "2024.1.0"
      pullPolicy:

    imagePullSecrets: []

    namespace: dask-gateway

    environment: {}

    scheduler:
      extraPodConfig: {}

      extraContainerConfig: {}

      cores:
        request:
        limit:

      memory:
        request:
        limit:

    worker:
      extraPodConfig: {}

      extraContainerConfig: {}

      cores:
        request:
        limit:

      memory:
        request:
        limit:

      threads:


controller:
  enabled: true

  annotations: {}

  resources: {}

  imagePullSecrets: []

  loglevel: INFO

  completedClusterMaxAge: 86400

  completedClusterCleanupPeriod: 600

  backoffBaseDelay: 0.1

  backoffMaxDelay: 300

  k8sApiRateLimit: 50

  k8sApiRateLimitBurst: 100

  image:
    name: ghcr.io/dask/dask-gateway-server
    tag: "2024.1.0"
    pullPolicy:

  nodeSelector: {}
  affinity: {}
  tolerations: []



traefik:
  replicas: 1

  annotations: {}

  resources: {}

  image:
    name: traefik
    tag: "2.10.6"
    pullPolicy:
  imagePullSecrets: []

  additionalArguments: []

  loglevel: WARN

  dashboard: false

  service:
    type: LoadBalancer
    annotations: {}
    spec: {}
    ports:
      web:
        port: 80
        nodePort:
      tcp:
        port: web
        nodePort:

  nodeSelector: {}
  affinity: {}
  tolerations: []



rbac:
  enabled: true

  controller:
    serviceAccountName:

  gateway:
    serviceAccountName:

  traefik:
    serviceAccountName:



global: {}

