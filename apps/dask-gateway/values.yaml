nameOverride: ""

fullnameOverride: ""

gateway:
  replicas: 1

  annotations: {}

  resources: {}

  prefix: /

  loglevel: INFO

  image:
    name: ghcr.io/dask/dask-gateway-server
    tag: "2024.1.0"
    pullPolicy:

  env: []

  imagePullSecrets: []

  service:
    annotations: {}

  auth:
    type: jupyterhub
    jupyterhub:
      apiToken: {{ jupyterhub.apitoken }}
      apiUrl: {{ jupyterhub.apiurl }}
      apiTokenFromSecretName: hub
      apiTokenFromSecretKey: hub.services.dask-gateway.apiToken

    simple:
      password:

    kerberos:
      keytab:

    custom:
      class:

      config: {}

  livenessProbe:
    enabled: true
    initialDelaySeconds: 5
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 6
  readinessProbe:
    enabled: true
    initialDelaySeconds: 5
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3

  nodeSelector: {}

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: "node-role.kubernetes.io/infra"
              operator: Exists

  tolerations: []

  extraConfig:
    clusteroptions: |
        from dask_gateway_server.options import Options, Integer, Float, String

        def option_handler(options):
            return {
                "worker_cores": options.worker_cores,
                "worker_memory": "%fG" % options.worker_memory,
                "image": options.image,
                "namespace": options.namespace,
                "cluster_max_cores": options.cluster_max_cores,
                "cluster_max_memory": options.cluster_max_memory,
                "cluster_max_workers": options.cluster_max_workers,
                "scheduler_extra_pod_annotations": options.scheduler_extra_pod_annotations,
                "scheduler_extra_pod_labels": options.scheduler_extra_pod_labels,
                "worker_extra_pod_config": options.worker_extra_pod_config,
            }

        c.Backend.cluster_options = Options(
            Integer("worker_cores", 2, min=1, max=4, label="Worker Cores"),
            Float("worker_memory", 4, min=1, max=8, label="Worker Memory (GiB)"),
            String("image", default="daskgateway/dask-gateway:latest", label="Image"),
            String("namespace", default="dask-gateway", label="Namespace"),
            Integer("cluster_max_cores", 2, min=1, max=4, label="Cluster_max_cores"),
            Integer("cluster_max_memory", 2, min=1, max=4, label="Cluster_max_memory"),
            Integer("cluster_max_workers", 2, min=1, max=4, label="Cluster_max_workers"),
            String("scheduler_extra_pod_annotations", default="podannotation", label="Scheduler_extra_pod_annotations"),
            String("scheduler_extra_pod_labels", default="podlabels", label="Scheduler_extra_pod_labels"),
            String("worker_extra_pod_config", default="extrapodconfig", label="Worker_extra_pod_config"),
            handler=option_handler,
        )

  backend:
    image:
      name: ghcr.io/dask/dask-gateway
      tag: "2024.1.0"
      pullPolicy:

    imagePullSecrets: []

    namespace: dask-gateway

    environment: {}

    scheduler:
      extraPodConfig: {}

      extraContainerConfig: {}

      cores:
        request:
        limit:

      memory:
        request:
        limit:

    worker:
      extraPodConfig: {}

      extraContainerConfig: {}

      cores:
        request:
        limit:

      memory:
        request:
        limit:

      threads:


controller:
  enabled: true

  annotations: {}

  resources: {}

  imagePullSecrets: []

  loglevel: INFO

  completedClusterMaxAge: 86400

  completedClusterCleanupPeriod: 600

  backoffBaseDelay: 0.1

  backoffMaxDelay: 300

  k8sApiRateLimit: 50

  k8sApiRateLimitBurst: 100

  image:
    name: ghcr.io/dask/dask-gateway-server
    tag: "2024.1.0"
    pullPolicy:

  nodeSelector: {}

  affinity: 
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: "node-role.kubernetes.io/infra"
              operator: Exists

  
  tolerations: []



traefik:
  replicas: 1

  annotations: {}

  resources: {}

  image:
    name: traefik
    tag: "2.10.6"
    pullPolicy:
  imagePullSecrets: []

  additionalArguments: []

  loglevel: WARN

  dashboard: false

  service:
    type: LoadBalancer
    annotations: {}
    spec: {}
    ports:
      web:
        port: 80
        nodePort:
      tcp:
        port: web
        nodePort:

  nodeSelector: {}

  affinity: 
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: "node-role.kubernetes.io/infra"
              operator: Exists



  tolerations: []



rbac:
  enabled: true

  controller:
    serviceAccountName:

  gateway:
    serviceAccountName:

  traefik:
    serviceAccountName:



global: {}