apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  labels:
    wait-for-deployment: Ready
spec:
  db:
    vendor: postgres
    host: {{ keycloak.database.host }}
    passwordSecret:
      name: {{ keycloak.database.secret }}
      key: password
    usernameSecret:
      name: {{ keycloak.database.secret }}
      key: username
  hostname:
    hostname: iam.{{ platform_domain_name }}
    adminUrl: https://iam.{{ platform_domain_name }}
  http:
    httpEnabled: true
    httpPort: 8080
  ingress:
    enabled: false
  instances: {{ keycloak.replicaCount }}
  additionalOptions:
    - name: proxy
      value: "{{ keycloak.proxy.mode }}"
    - name: log-level
      value: "{{ keycloak.logLevel }}"
    - name: metrics-enabled
      value: 'true'
  unsupported:
    podTemplate:
      spec:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: node-role.kubernetes.io/infra
                  operator: Exists
