apiVersion: v1
kind: Service
metadata:
  name: wazuh
  namespace: wazuh
  labels:
    app: wazuh-manager
spec:
  type: ClusterIP
  selector:
    app: wazuh-manager
    node-type: master
  ports:
  - name: agents-events
    port: 1514
    targetPort: 1514
  - name: api
    port: 55000
    targetPort: 55000
  - name: registration
    port: 1515
    targetPort: 1515