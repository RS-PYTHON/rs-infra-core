apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: keycloak
spec:
  endpoints:
  - interval: {{ keycloak.serviceMonitor.interval}}
    path: /metrics
    port: http
    scrapeTimeout: {{ keycloak.serviceMonitor.scrapeTimeout }}
  selector: 
    matchLabels: 
      app: keycloak
